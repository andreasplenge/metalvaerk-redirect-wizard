<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Redirect any path to the new domain, preserving the path -->
    <script>
        var newDomain = "https://metalværk.dk";
        var currentPath = window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(newDomain + currentPath);
    </script>
    
    <!-- Fallback: redirect to root if JS is disabled -->
    <meta http-equiv="refresh" content="0; url=https://metalværk.dk">
    
    <title>Redirecting to metalværk.dk</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        a {
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Redirecting to <a href="https://metalværk.dk">metalværk.dk</a>...</p>
    </div>
</body>
</html>
